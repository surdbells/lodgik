openapi: 3.0.3

info:
  title: Lodgik Hotel Management API
  version: 1.0.0
  description: |
    Enterprise hotel management platform API.
    Base URL: https://api.lodgik.co/api

    ## Authentication
    All protected endpoints require a Bearer JWT token in the Authorization header.
    Tokens are obtained via POST /api/auth/login.

    ## Multi-Tenancy
    Every request is scoped to the authenticated user's tenant.
    The `tenant_id` is resolved from the JWT — never passed explicitly.

    ## Response Envelope
    All responses follow a consistent structure:
    ```json
    { "success": true, "data": {}, "message": "optional message" }
    ```
    Errors:
    ```json
    { "success": false, "message": "Human-readable error", "errors": {} }
    ```

    ## Monetary Values
    All monetary fields are stored and returned in **kobo** (integer, 1 NGN = 100 kobo)
    unless otherwise noted in the endpoint description.

    ## Role Hierarchy
    - `super_admin` — Lodgik platform administrator
    - `property_admin` — Hotel owner / chain director
    - `manager` — Property general manager
    - `accountant` — Finance staff
    - `front_desk` — Reception
    - `housekeeping` — Housekeeping staff
    - `kitchen` — Kitchen staff
    - `bar` — Bar staff
    - `security` — Security personnel
    - `hr` — Human resources
    - `engineer` / `maintenance` — Technical staff
    - `concierge` — Guest services
    - `gym_staff` — Gym staff
    - `merchant_admin` / `merchant_agent` — Marketplace roles

servers:
  - url: https://api.lodgik.co/api
    description: Production

tags:
  - name: Auth
  - name: Rooms
  - name: Amenities
  - name: Bookings
  - name: Folios
  - name: Invoices
  - name: Finance
  - name: Night Audit
  - name: Police Reports
  - name: Analytics
  - name: Dashboard
  - name: POS
  - name: Housekeeping
  - name: Guest Services
  - name: Chat
  - name: Notifications
  - name: Service Requests
  - name: Room Controls
  - name: IoT
  - name: Security
  - name: Gym
  - name: Spa
  - name: Loyalty
  - name: OTA
  - name: WhatsApp
  - name: HR — Employees
  - name: HR — Attendance
  - name: HR — Leave
  - name: HR — Payroll
  - name: Assets
  - name: Settings
  - name: Audit Logs
  - name: Admin — Merchants
  - name: Staff
  - name: Guests

# ─────────────────────────────────────────────────────────────────
# Reusable components
# ─────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Primitives ──────────────────────────────────────────────
    UUID:
      type: string
      format: uuid
      example: "3f9d8a1b-4c72-4e0f-a9b1-d3f8e2c70123"

    Timestamp:
      type: string
      format: date-time
      example: "2026-03-01T14:30:00Z"

    Date:
      type: string
      format: date
      example: "2026-03-01"

    Kobo:
      type: integer
      description: Monetary amount in kobo (1 NGN = 100 kobo)
      example: 150000

    # ── Standard responses ───────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string }
        data: {}

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Validation failed" }
        errors:
          type: object
          additionalProperties: { type: string }

    PaginatedMeta:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        per_page: { type: integer }
        last_page: { type: integer }

    # ── Auth ─────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }

    AuthUser:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string }
        tenant_id: { $ref: '#/components/schemas/UUID' }
        property_id: { $ref: '#/components/schemas/UUID', nullable: true }
        token: { type: string, description: JWT bearer token }

    # ── Room ─────────────────────────────────────────────────────
    RoomType:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        property_id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        description: { type: string, nullable: true }
        base_rate: { $ref: '#/components/schemas/Kobo' }
        hourly_rate: { $ref: '#/components/schemas/Kobo', nullable: true }
        max_occupancy: { type: integer }
        amenities: { type: array, items: { type: string } }
        photos: { type: array, items: { type: string } }
        is_active: { type: boolean }
        created_at: { $ref: '#/components/schemas/Timestamp' }
        updated_at: { $ref: '#/components/schemas/Timestamp' }

    Room:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        property_id: { $ref: '#/components/schemas/UUID' }
        room_type_id: { $ref: '#/components/schemas/UUID' }
        room_number: { type: string, example: "101" }
        floor: { type: integer, nullable: true }
        status: { type: string, enum: [available, occupied, maintenance, checkout, dirty, inspected] }
        status_label: { type: string }
        status_color: { type: string }
        notes: { type: string, nullable: true }
        amenities: { type: array, items: { type: string } }

    Amenity:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        category: { type: string, nullable: true, example: "comfort" }
        icon: { type: string, nullable: true, example: "wifi" }
        is_active: { type: boolean }

    # ── Booking ───────────────────────────────────────────────────
    Booking:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        property_id: { $ref: '#/components/schemas/UUID' }
        guest_id: { $ref: '#/components/schemas/UUID' }
        room_id: { $ref: '#/components/schemas/UUID', nullable: true }
        booking_ref: { type: string, example: "BK-20260301-001" }
        booking_type: { type: string, enum: [standard, hourly, group] }
        status: { type: string, enum: [pending, confirmed, checked_in, checked_out, cancelled, no_show] }
        check_in: { $ref: '#/components/schemas/Timestamp' }
        check_out: { $ref: '#/components/schemas/Timestamp' }
        adults: { type: integer }
        children: { type: integer }
        rate_per_night: { $ref: '#/components/schemas/Kobo' }
        total_amount: { $ref: '#/components/schemas/Kobo' }
        discount_amount: { $ref: '#/components/schemas/Kobo' }
        source: { type: string, nullable: true, example: "direct" }
        notes: { type: string, nullable: true }
        checked_in_at: { $ref: '#/components/schemas/Timestamp', nullable: true }
        checked_out_at: { $ref: '#/components/schemas/Timestamp', nullable: true }
        created_at: { $ref: '#/components/schemas/Timestamp' }

    # ── Folio ─────────────────────────────────────────────────────
    Folio:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        booking_id: { $ref: '#/components/schemas/UUID' }
        guest_id: { $ref: '#/components/schemas/UUID' }
        folio_number: { type: string }
        status: { type: string, enum: [open, closed, voided] }
        total_charges: { $ref: '#/components/schemas/Kobo' }
        total_payments: { $ref: '#/components/schemas/Kobo' }
        total_adjustments: { $ref: '#/components/schemas/Kobo' }
        balance: { $ref: '#/components/schemas/Kobo' }
        closed_at: { $ref: '#/components/schemas/Timestamp', nullable: true }

    # ── Night Audit ───────────────────────────────────────────────
    NightAudit:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        property_id: { $ref: '#/components/schemas/UUID' }
        audit_date: { $ref: '#/components/schemas/Date' }
        status: { type: string, enum: [open, closed] }
        total_rooms: { type: integer }
        rooms_occupied: { type: integer }
        rooms_available: { type: integer }
        check_ins: { type: integer }
        check_outs: { type: integer }
        no_shows: { type: integer }
        occupancy_rate: { type: number, format: float, example: 72.5 }
        room_revenue: { $ref: '#/components/schemas/Kobo' }
        fnb_revenue: { $ref: '#/components/schemas/Kobo' }
        other_revenue: { $ref: '#/components/schemas/Kobo' }
        total_revenue: { $ref: '#/components/schemas/Kobo' }
        total_expenses: { $ref: '#/components/schemas/Kobo' }
        outstanding_balance: { $ref: '#/components/schemas/Kobo' }
        cash_collected: { $ref: '#/components/schemas/Kobo' }
        card_collected: { $ref: '#/components/schemas/Kobo' }
        transfer_collected: { $ref: '#/components/schemas/Kobo' }
        adr: { type: number, format: float, description: Average Daily Rate }
        revpar: { type: number, format: float, description: Revenue Per Available Room }
        discrepancies: { type: array, nullable: true, items: { type: object } }
        closed_by_name: { type: string, nullable: true }
        closed_at: { $ref: '#/components/schemas/Timestamp', nullable: true }

    # ── POS ───────────────────────────────────────────────────────
    PosTable:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        property_id: { $ref: '#/components/schemas/UUID' }
        number: { type: string, example: "T1" }
        seats: { type: integer, example: 4 }
        section: { type: string, enum: [restaurant, bar, poolside, terrace, private] }
        status: { type: string, enum: [available, occupied, reserved, inactive] }
        current_order_id: { $ref: '#/components/schemas/UUID', nullable: true }
        qr_code: { type: string, nullable: true }

    PosCategory:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        type: { type: string, enum: [food, beverage, spirits, cocktails] }
        sort_order: { type: integer }
        is_active: { type: boolean }

    PosProduct:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        category_id: { $ref: '#/components/schemas/UUID' }
        name: { type: string }
        description: { type: string, nullable: true }
        price: { $ref: '#/components/schemas/Kobo' }
        is_available: { type: boolean }
        requires_kitchen: { type: boolean }
        prep_time_minutes: { type: integer }

    PosOrder:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        order_number: { type: string }
        table_id: { $ref: '#/components/schemas/UUID', nullable: true }
        table_number: { type: string, nullable: true }
        order_type: { type: string, enum: [dine_in, takeaway, room_service] }
        status: { type: string, enum: [open, closed, cancelled] }
        status_label: { type: string }
        status_color: { type: string }
        guest_name: { type: string, nullable: true }
        booking_id: { $ref: '#/components/schemas/UUID', nullable: true }
        item_count: { type: integer }
        total_amount: { $ref: '#/components/schemas/Kobo' }
        created_at: { $ref: '#/components/schemas/Timestamp' }

    # ── Housekeeping ──────────────────────────────────────────────
    HousekeepingTask:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        property_id: { $ref: '#/components/schemas/UUID' }
        room_id: { $ref: '#/components/schemas/UUID' }
        room_number: { type: string }
        task_type: { type: string, enum: [checkout, stayover, deep_clean, turndown, inspection, maintenance] }
        priority: { type: string, enum: [low, normal, high, urgent] }
        status: { type: string, enum: [pending, assigned, in_progress, completed, inspected, cancelled] }
        assigned_to: { $ref: '#/components/schemas/UUID', nullable: true }
        assigned_name: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        checklist: { type: array, items: { type: object } }
        due_at: { $ref: '#/components/schemas/Timestamp', nullable: true }
        started_at: { $ref: '#/components/schemas/Timestamp', nullable: true }
        completed_at: { $ref: '#/components/schemas/Timestamp', nullable: true }

    # ── Police Report ─────────────────────────────────────────────
    PoliceReport:
      type: object
      properties:
        id: { $ref: '#/components/schemas/UUID' }
        property_id: { $ref: '#/components/schemas/UUID' }
        booking_id: { $ref: '#/components/schemas/UUID' }
        guest_id: { $ref: '#/components/schemas/UUID' }
        guest_name: { type: string }
        nationality: { type: string, nullable: true }
        id_type: { type: string, nullable: true, enum: [passport, nin, drivers_license, voters_card] }
        id_number: { type: string, nullable: true }
        passport_number: { type: string, nullable: true }
        nin: { type: string, nullable: true }
        address: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        purpose_of_visit: { type: string, nullable: true }
        arrival_date: { $ref: '#/components/schemas/Date' }
        departure_date: { $ref: '#/components/schemas/Date', nullable: true }
        room_number: { type: string, nullable: true }
        accompanying_persons: { type: integer, default: 0 }
        status: { type: string, enum: [pending, submitted] }
        submitted_at: { $ref: '#/components/schemas/Timestamp', nullable: true }

    # ── Analytics ─────────────────────────────────────────────────
    AnalyticsParams:
      type: object
      properties:
        property_id:
          $ref: '#/components/schemas/UUID'
        from:
          $ref: '#/components/schemas/Date'
        to:
          $ref: '#/components/schemas/Date'

security:
  - bearerAuth: []

# ─────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Auth]
      summary: Staff login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            example:
              email: admin@lodgik.co
              password: secret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuthUser' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Invalidate current session token
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get authenticated user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuthUser' }

  /auth/password:
    put:
      tags: [Auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password, new_password]
              properties:
                current_password: { type: string, format: password }
                new_password: { type: string, format: password, minLength: 8 }
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }
        '422':
          description: Validation error
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ══════════════════════════════════════════════════════
  # ROOMS
  # ══════════════════════════════════════════════════════
  /room-types:
    get:
      tags: [Rooms]
      summary: List room types for a property
      parameters:
        - in: query
          name: property_id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses:
        '200':
          description: Room types list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/RoomType' }
    post:
      tags: [Rooms]
      summary: Create room type
      description: Roles — property_admin, manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, name, base_rate, max_occupancy]
              properties:
                property_id: { $ref: '#/components/schemas/UUID' }
                name: { type: string }
                description: { type: string }
                base_rate: { $ref: '#/components/schemas/Kobo' }
                hourly_rate: { $ref: '#/components/schemas/Kobo' }
                max_occupancy: { type: integer, minimum: 1 }
                amenities: { type: array, items: { type: string } }
      responses:
        '201':
          description: Room type created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/RoomType' }

  /room-types/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { $ref: '#/components/schemas/UUID' }
    put:
      tags: [Rooms]
      summary: Update room type
      description: Roles — property_admin, manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                base_rate: { $ref: '#/components/schemas/Kobo' }
                max_occupancy: { type: integer }
                amenities: { type: array, items: { type: string } }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/RoomType' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    delete:
      tags: [Rooms]
      summary: Delete room type (soft delete)
      description: Roles — property_admin
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }

  /rooms:
    get:
      tags: [Rooms]
      summary: List rooms for a property
      parameters:
        - in: query
          name: property_id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: room_type_id
          schema: { $ref: '#/components/schemas/UUID' }
      responses:
        '200':
          description: Room list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Room' }
    post:
      tags: [Rooms]
      summary: Create room
      description: Roles — property_admin, manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, room_type_id, room_number]
              properties:
                property_id: { $ref: '#/components/schemas/UUID' }
                room_type_id: { $ref: '#/components/schemas/UUID' }
                room_number: { type: string }
                floor: { type: integer }
                notes: { type: string }
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Room' }

  /rooms/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { $ref: '#/components/schemas/UUID' }
    put:
      tags: [Rooms]
      summary: Update room
      description: Roles — property_admin, manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                room_number: { type: string }
                floor: { type: integer }
                status: { type: string }
                notes: { type: string }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Room' }
    delete:
      tags: [Rooms]
      summary: Delete room
      description: Roles — property_admin
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }

  # ══════════════════════════════════════════════════════
  # AMENITIES
  # ══════════════════════════════════════════════════════
  /amenities:
    get:
      tags: [Amenities]
      summary: List all amenities for tenant
      parameters:
        - in: query
          name: category
          schema: { type: string }
          description: Filter by category (comfort, technology, dining, etc.)
      responses:
        '200':
          description: Amenity list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Amenity' }
    post:
      tags: [Amenities]
      summary: Create amenity
      description: Roles — property_admin, manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: "Swimming Pool" }
                category: { type: string, example: "recreation" }
                icon: { type: string, example: "pool" }
      responses:
        '201':
          description: Amenity created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Amenity' }

  /amenities/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { $ref: '#/components/schemas/UUID' }
    put:
      tags: [Amenities]
      summary: Update amenity
      description: Roles — property_admin, manager
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                category: { type: string }
                icon: { type: string }
                is_active: { type: boolean }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Amenity' }
        '404':
          description: Not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
    delete:
      tags: [Amenities]
      summary: Delete amenity
      description: Roles — property_admin, manager
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuccessResponse' }

  # ══════════════════════════════════════════════════════
  # BOOKINGS
  # ══════════════════════════════════════════════════════
  /bookings:
    get:
      tags: [Bookings]
      summary: List bookings
