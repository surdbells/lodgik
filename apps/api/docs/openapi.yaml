      parameters:
        - in: query
          name: property_id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: from
          schema: { $ref: '#/components/schemas/Date' }
        - in: query
          name: to
          schema: { $ref: '#/components/schemas/Date' }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Booking list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Booking' }
                      meta: { $ref: '#/components/schemas/PaginatedMeta' }
    post:
      tags: [Bookings]
      summary: Create booking
      description: Roles — property_admin, manager, front_desk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, guest_id, check_in, check_out, booking_type]
              properties:
                property_id: { $ref: '#/components/schemas/UUID' }
                guest_id: { $ref: '#/components/schemas/UUID' }
                room_id: { $ref: '#/components/schemas/UUID' }
                room_type_id: { $ref: '#/components/schemas/UUID' }
                check_in: { $ref: '#/components/schemas/Timestamp' }
                check_out: { $ref: '#/components/schemas/Timestamp' }
                booking_type: { type: string, enum: [standard, hourly, group] }
                adults: { type: integer, default: 1 }
                children: { type: integer, default: 0 }
                rate_per_night: { $ref: '#/components/schemas/Kobo' }
                source: { type: string }
                special_requests: { type: string }
      responses:
        '201':
          description: Booking created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Booking' }
        '409':
          description: Room not available for requested dates
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

