  /admin/audit-logs:
    get:
      tags: [Audit Logs]
      summary: List audit log entries
      description: Roles — super_admin, property_admin, manager. Immutable record of all platform actions.
      parameters:
        - in: query
          name: property_id
          schema: { $ref: '#/components/schemas/UUID' }
        - in: query
          name: user_id
          schema: { $ref: '#/components/schemas/UUID' }
        - in: query
          name: action
          schema: { type: string }
        - in: query
          name: entity_type
          schema: { type: string }
        - in: query
          name: from
          schema: { $ref: '#/components/schemas/Date' }
        - in: query
          name: to
          schema: { $ref: '#/components/schemas/Date' }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: per_page
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Audit log entries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { $ref: '#/components/schemas/UUID' }
                            user_id: { $ref: '#/components/schemas/UUID' }
                            user_name: { type: string }
                            action: { type: string }
                            entity_type: { type: string }
                            entity_id: { $ref: '#/components/schemas/UUID' }
                            changes: { type: object }
                            ip_address: { type: string }
                            created_at: { $ref: '#/components/schemas/Timestamp' }
                      meta: { $ref: '#/components/schemas/PaginatedMeta' }

