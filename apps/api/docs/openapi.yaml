  # ══════════════════════════════════════════════════════
  /police-reports:
    get:
      tags: [Police Reports]
      summary: List police reports for a property
      description: Roles — property_admin, manager, accountant, front_desk, security
      parameters:
        - in: query
          name: property_id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
        - in: query
          name: from
          schema: { $ref: '#/components/schemas/Date' }
        - in: query
          name: to
          schema: { $ref: '#/components/schemas/Date' }
        - in: query
          name: status
          schema: { type: string, enum: [pending, submitted] }
      responses:
        '200':
          description: Report list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/PoliceReport' }
    post:
      tags: [Police Reports]
      summary: Create police report for a guest
      description: Roles — property_admin, manager, front_desk. Report starts as status=pending.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, booking_id, guest_id, guest_name, arrival_date]
              properties:
                property_id: { $ref: '#/components/schemas/UUID' }
                booking_id: { $ref: '#/components/schemas/UUID' }
                guest_id: { $ref: '#/components/schemas/UUID' }
                guest_name: { type: string }
                nationality: { type: string }
                id_type: { type: string, enum: [passport, nin, drivers_license, voters_card] }
                id_number: { type: string }
                passport_number: { type: string }
                nin: { type: string }
                address: { type: string }
                phone: { type: string }
                purpose_of_visit: { type: string }
                arrival_date: { $ref: '#/components/schemas/Date' }
                departure_date: { $ref: '#/components/schemas/Date' }
                room_number: { type: string }
                accompanying_persons: { type: integer, default: 0 }
      responses:
        '201':
          description: Report created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PoliceReport' }

  /police-reports/{id}/submit:
    post:
      tags: [Police Reports]
      summary: Mark a police report as submitted
      description: Roles — property_admin, manager. Sets status to submitted and records timestamp.
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses:
        '200':
          description: Report submitted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PoliceReport' }
        '404':
          description: Report not found
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

