  # ══════════════════════════════════════════════════════
  # NIGHT AUDIT
  # ══════════════════════════════════════════════════════
  /night-audit:
    get:
      tags: [Night Audit]
      summary: List audit records for a property
      description: Roles — property_admin, manager, accountant
      parameters:
        - in: query
          name: property_id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
        - in: query
          name: from
          schema: { $ref: '#/components/schemas/Date' }
        - in: query
          name: to
          schema: { $ref: '#/components/schemas/Date' }
      responses:
        '200':
          description: Audit list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/NightAudit' }

  /night-audit/generate:
    post:
      tags: [Night Audit]
      summary: Run night audit for today
      description: |
        Roles — property_admin, manager, accountant.
        Computes full metrics: occupancy, check-ins/outs, revenue by category,
        payment breakdowns, ADR, RevPAR, and outstanding balances.
        Idempotent — if an open audit exists for today it is updated; otherwise a new record is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id]
              properties:
                property_id: { $ref: '#/components/schemas/UUID' }
                audit_date:
                  $ref: '#/components/schemas/Date'
                  description: Defaults to today if omitted
      responses:
        '200':
          description: Audit computed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/NightAudit' }

  /night-audit/{id}/close:
    post:
      tags: [Night Audit]
      summary: Close an open audit
      description: Roles — property_admin, manager, accountant. Records closing staff name and timestamp.
      parameters:
        - in: path
          name: id
          required: true
          schema: { $ref: '#/components/schemas/UUID' }
      responses:
        '200':
          description: Audit closed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/NightAudit' }
        '409':
          description: Audit is already closed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

