openapi: 3.0.0
info:
  title: Lodgik Hotel Management System API
  description: >-
    Comprehensive REST API for the Lodgik multi-tenant SaaS hotel management platform.
    Covers property management, guest services, finance, HR, F&B, merchant ecosystem, IoT, and more.
    Authentication: Bearer JWT token required for all endpoints except /api/health,
    /api/auth/login, /api/auth/register, and /api/subscriptions/webhook.
  version: 1.0.0
  contact:
    name: Lodgik Support
    email: support@lodgik.com
    url: https://lodgik.com
servers:
  - url: http://localhost:8080
    description: Development
  - url: https://api.lodgik.com
    description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token from /api/auth/login
security:
  - bearerAuth: []
tags:
  - name: Admin
    description: Super admin platform management — tenants, plans, features
  - name: Analytics
    description: Revenue, occupancy, and performance analytics
  - name: AppDistribution
    description: Mobile app release management and download tracking
  - name: Asset
    description: Hotel asset management, maintenance, and incidents
  - name: Attendance
    description: Staff clock in/out and attendance tracking
  - name: Auth
    description: Authentication — register, login, refresh, forgot/reset password
  - name: Booking
    description: Room reservations, group bookings, addons, status lifecycle
  - name: Chat
    description: Multi-department guest-staff real-time messaging
  - name: Dashboard
    description: Hotel operational dashboard and KPIs
  - name: Employee
    description: Employee management, departments, positions, performance reviews
  - name: Feature
    description: Feature flag management per tenant
  - name: Finance
    description: Night audit, expense tracking, revenue analytics, tax configuration
  - name: Folio
    description: Guest folios — charges, payments, adjustments
  - name: Guest
    description: Guest profiles, documents, preferences, loyalty
  - name: GuestAuth
    description: Guest mobile app authentication and session management
  - name: GuestServices
    description: Smart guest services — amenity vouchers, waitlist, charge transfers
  - name: Gym
    description: Gym facility — memberships, classes, bookings, visits
  - name: Health
    description: System health check (no authentication required)
  - name: Housekeeping
    description: Room cleaning tasks, assignments, and inspections
  - name: Invoice
    description: Invoice generation and management
  - name: IoT
    description: IoT device management and automation rules
  - name: Leave
    description: Staff leave types, requests, approvals, balance tracking
  - name: Loyalty
    description: Guest loyalty program — points, tiers, promotions
  - name: Merchant
    description: Merchant partner ecosystem — KYC, commissions, payouts, leads
  - name: Notification
    description: Push and in-app notifications, device token management
  - name: Onboarding
    description: Tenant onboarding wizard steps and property setup
  - name: Ota
    description: OTA channel management (Booking.com, Expedia)
  - name: Payroll
    description: Staff payroll processing, tax brackets, salary items
  - name: Pos
    description: Point of sale — menus, orders, kitchen display, split bills
  - name: Room
    description: Room types, inventory, status management, pricing rules
  - name: RoomControl
    description: In-room IoT controls (AC, lighting, DND)
  - name: Security
    description: Visitor access codes, gate passes, police reports, guard movements
  - name: ServiceRequest
    description: Guest service requests (room service, maintenance, etc.)
  - name: Spa
    description: Spa and pool management — services, bookings, access logs
  - name: Staff
    description: Staff directory and user management
  - name: Subscription
    description: SaaS subscription billing via Paystack
  - name: Tenant
    description: Tenant/property configuration and branding
  - name: Usage
    description: Platform usage metrics and quotas
  - name: WhatsApp
    description: WhatsApp messaging via Termii integration
