openapi: 3.0.0
info:
  title: Lodgik Hotel Management System API
  description: 'Comprehensive REST API for the Lodgik multi-tenant SaaS hotel management platform. Covers property management,
    guest services, finance, HR, F&B, merchant ecosystem, IoT, and lots more.


    **Authentication:** Bearer JWT token required for all endpoints except those marked with `security: []`.


    **Multi-tenancy:** Most endpoints require tenant context (injected from JWT by TenantMiddleware).


    **Feature Gating:** Some modules require specific subscription tiers (indicated in descriptions).


    **Standard Response Envelope:**

    ```json

    { "success": true, "message": "...", "data": { ... } }

    ```


    **Paginated Response:**

    ```json

    { "success": true, "data": [...], "meta": { "page": 1, "limit": 20, "total": 100 } }

    ```'
  version: 1.0.0
  contact:
    name: Lodgik Support
    email: support@lodgik.co
    url: https://lodgik.co
servers:
- url: http://localhost:8080
  description: Development
- url: https://api.lodgik.co
  description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from POST /api/auth/login
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object
    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            type: object
        meta:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: object
          additionalProperties:
            type: string
  responses:
    Success:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    Created:
      description: Resource created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SuccessResponse'
    NoContent:
      description: Resource deleted
    Unauthorized:
      description: Authentication required
    Forbidden:
      description: Insufficient permissions
    NotFound:
      description: Resource not found
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
security:
- bearerAuth: []
