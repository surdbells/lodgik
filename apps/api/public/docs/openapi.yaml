                name: {type: string}
                contact_name: {type: string}
                email: {type: string}
                phone: {type: string}
                payment_terms: {type: string}
                is_active: {type: boolean}
      responses:
        '200': {$ref: '#/components/responses/Success'}
    delete:
      tags: [Procurement]
      operationId: deleteVendor
      summary: Deactivate vendor
