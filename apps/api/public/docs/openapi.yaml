  /api/procurement/purchase-orders:
    get:
      tags: [Procurement]
      operationId: listPurchaseOrders
      summary: List purchase orders
      security: [{bearerAuth: []}]
      parameters:
        - {name: property_id, in: query, required: true, schema: {type: string, format: uuid}}
        - {name: status, in: query, schema: {type: string, enum: [draft, submitted, acknowledged, partial, received, cancelled]}}
        - {name: vendor_id, in: query, schema: {type: string, format: uuid}}
        - {name: date_from, in: query, schema: {type: string, format: date}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
      responses:
        '200': {$ref: '#/components/responses/PaginatedSuccess'}
    post:
      tags: [Procurement]
      operationId: createPurchaseOrder
      summary: Create a purchase order
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, vendor_id, items]
              properties:
                property_id: {type: string, format: uuid}
                vendor_id: {type: string, format: uuid}
                purchase_request_id: {type: string, format: uuid}
                expected_delivery_date: {type: string, format: date}
                payment_terms: {type: string}
                notes: {type: string}
                items:
                  type: array
                  items:
                    type: object
                    required: [stock_item_id, quantity, unit_price]
                    properties:
                      stock_item_id: {type: string, format: uuid}
                      quantity: {type: number}
                      unit_price: {type: integer, description: Price per unit in kobo}
      responses:
        '201': {$ref: '#/components/responses/Created'}

  /api/procurement/purchase-orders/{id}:
    get:
      tags: [Procurement]
      operationId: getPurchaseOrder
      summary: Get PO detail
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {$ref: '#/components/responses/Success'}
    put:
      tags: [Procurement]
      operationId: updatePurchaseOrder
      summary: Update PO (only in draft status)
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                expected_delivery_date: {type: string, format: date}
