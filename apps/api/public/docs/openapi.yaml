  /api/procurement/purchase-orders/{id}/submit:
    post:
      tags: [Procurement]
      operationId: submitPurchaseOrder
      summary: Submit PO to vendor
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
