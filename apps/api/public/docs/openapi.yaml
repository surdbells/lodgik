      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {$ref: '#/components/responses/Success'}

  /api/procurement/purchase-requests/{id}/approve:
    post:
      tags: [Procurement]
      operationId: approvePurchaseRequest
      summary: Approve a purchase request
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: {type: string}
      responses:
        '200': {$ref: '#/components/responses/Success'}

  /api/procurement/purchase-requests/{id}/reject:
    post:
      tags: [Procurement]
      operationId: rejectPurchaseRequest
      summary: Reject a purchase request
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: {type: string}
      responses:
