  /api/procurement/purchase-requests:
    get:
      tags: [Procurement]
      operationId: listPurchaseRequests
      summary: List purchase requests
      security: [{bearerAuth: []}]
      parameters:
        - {name: property_id, in: query, required: true, schema: {type: string, format: uuid}}
        - {name: status, in: query, schema: {type: string, enum: [draft, submitted, approved, rejected, ordered]}}
        - {name: date_from, in: query, schema: {type: string, format: date}}
        - {name: date_to, in: query, schema: {type: string, format: date}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
      responses:
        '200': {$ref: '#/components/responses/PaginatedSuccess'}
    post:
      tags: [Procurement]
      operationId: createPurchaseRequest
      summary: Create a purchase request
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, items]
              properties:
                property_id: {type: string, format: uuid}
                required_by: {type: string, format: date}
                justification: {type: string}
                items:
                  type: array
                  items:
                    type: object
                    required: [stock_item_id, quantity_requested]
                    properties:
                      stock_item_id: {type: string, format: uuid}
                      quantity_requested: {type: number}
                      notes: {type: string}
      responses:
        '201': {$ref: '#/components/responses/Created'}
        '422': {$ref: '#/components/responses/ValidationError'}

  /api/procurement/purchase-requests/{id}:
    get:
      tags: [Procurement]
      operationId: getPurchaseRequest
      summary: Get purchase request detail
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {$ref: '#/components/responses/Success'}

  /api/procurement/purchase-requests/{id}/submit:
    post:
      tags: [Procurement]
