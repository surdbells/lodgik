  /api/procurement/purchase-orders/{id}/receive:
    post:
      tags: [Procurement]
      operationId: receivePurchaseOrder
      summary: Mark PO as received (triggers GRN)
      description: Records full receipt of the PO. Creates a GRN stock movement automatically. Use the /api/inventory/movements/grn endpoint for partial deliveries.
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      requestBody:
        content:
          application/json:
            schema:
              type: object
