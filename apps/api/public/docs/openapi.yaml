      security: [{bearerAuth: []}]
      parameters:
        - {name: property_id, in: query, required: true, schema: {type: string, format: uuid}}
        - {name: type, in: query, schema: {type: string, enum: [opening, grn, issue, transfer, adjustment, pos_deduction]}}
        - {name: item_id, in: query, schema: {type: string, format: uuid}}
        - {name: location_id, in: query, schema: {type: string, format: uuid}}
        - {name: date_from, in: query, schema: {type: string, format: date}}
        - {name: date_to, in: query, schema: {type: string, format: date}}
        - {name: page, in: query, schema: {type: integer, default: 1}}
        - {name: limit, in: query, schema: {type: integer, default: 50}}
