        '200': {$ref: '#/components/responses/Success'}

  # ─────────────────────────────────────────────────────────────────
  # RECIPE & FOOD COST MODULE
  # ─────────────────────────────────────────────────────────────────

  /api/pos/recipes:
    get:
      tags: [Recipe]
      operationId: listRecipes
      summary: List recipes
      description: Returns all active recipes for the tenant. Each recipe lists its ingredients with stock item references and quantities.
      security: [{bearerAuth: []}]
      parameters:
        - {name: property_id, in: query, schema: {type: string, format: uuid}}
      responses:
        '200': {$ref: '#/components/responses/Success'}
    post:
      tags: [Recipe]
      operationId: upsertRecipe
      summary: Create or update a recipe
      description: If a recipe already exists for the given product_id in this tenant, it is replaced entirely (upsert). Use this endpoint for both create and edit.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, ingredients]
              properties:
                product_id: {type: string, format: uuid, description: POS product this recipe belongs to}
                property_id: {type: string, format: uuid}
                yield_quantity: {type: number, format: float, default: 1, description: How many servings this recipe produces}
                yield_uom: {type: string, default: serving}
                notes: {type: string}
                ingredients:
                  type: array
                  description: Replaces all existing ingredient lines on upsert
                  items:
                    type: object
                    required: [stock_item_id, quantity_per_yield, uom_symbol]
                    properties:
                      stock_item_id: {type: string, format: uuid}
                      quantity_per_yield: {type: number, format: float}
                      uom_symbol: {type: string, example: kg}
                      notes: {type: string}
                      sort_order: {type: integer, default: 0}
      responses:
        '201': {$ref: '#/components/responses/Created'}
        '422': {$ref: '#/components/responses/ValidationError'}

  /api/pos/recipes/{id}:
    get:
      tags: [Recipe]
      operationId: getRecipe
      summary: Get recipe by ID
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {$ref: '#/components/responses/Success'}
        '404': {$ref: '#/components/responses/NotFound'}
    delete:
      tags: [Recipe]
      operationId: deleteRecipe
      summary: Delete a recipe
      description: Marks the recipe as inactive. Historical POS deductions are preserved in the movement ledger.
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {$ref: '#/components/responses/Success'}
        '404': {$ref: '#/components/responses/NotFound'}

  /api/pos/recipes/product/{product_id}:
    get:
      tags: [Recipe]
      operationId: getRecipeByProduct
      summary: Get recipe by POS product ID
      security: [{bearerAuth: []}]
      parameters:
        - {name: product_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {$ref: '#/components/responses/Success'}
        '404': {$ref: '#/components/responses/NotFound'}

  /api/pos/recipes/food-cost/{product_id}:
    get:
      tags: [Recipe]
      operationId: foodCostByProduct
      summary: Theoretical food cost for a single product
      description: |
        Calculates the total ingredient cost for one serving based on the active recipe and current stock unit costs.
        Returns: ingredient_cost (kobo), selling_price (kobo), food_cost_pct (%), and a per-ingredient breakdown.
      security: [{bearerAuth: []}]
      parameters:
        - {name: product_id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200':
          description: Food cost breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: object
                    properties:
                      product_id: {type: string}
                      product_name: {type: string}
                      selling_price: {type: integer, description: In kobo}
                      ingredient_cost: {type: integer, description: Total cost of all ingredients in kobo}
                      food_cost_pct: {type: number, description: ingredient_cost / selling_price x 100}
                      ingredients:
                        type: array
                        items:
                          type: object
                          properties:
                            item_name: {type: string}
                            quantity_per_yield: {type: number}
                            uom: {type: string}
                            unit_cost: {type: integer}
                            line_cost: {type: integer}

  /api/pos/food-cost-report:
    get:
      tags: [Recipe]
      operationId: foodCostReport
      summary: Food cost report across a date range
      description: |
        Compares theoretical vs actual food cost by product over the specified period.
        Theoretical cost = recipe ingredient cost x quantity sold.
        Actual cost = stock movements of type pos_deduction over the same period.
      security: [{bearerAuth: []}]
      parameters:
        - {name: property_id, in: query, schema: {type: string, format: uuid}}
        - {name: date_from, in: query, schema: {type: string, format: date}, description: Defaults to start of current month}
        - {name: date_to, in: query, schema: {type: string, format: date}, description: Defaults to today}
      responses:
        '200':
          description: Food cost report
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: {type: boolean}
                  data:
                    type: object
                    properties:
                      period_from: {type: string, format: date}
                      period_to: {type: string, format: date}
                      total_revenue: {type: integer}
                      total_theoretical_cost: {type: integer}
                      total_actual_cost: {type: integer}
                      overall_food_cost_pct: {type: number}
                      products:
                        type: array
                        items:
                          type: object
                          properties:
                            product_name: {type: string}
                            quantity_sold: {type: integer}
                            revenue: {type: integer}
                            theoretical_cost: {type: integer}
                            actual_cost: {type: integer}
                            variance: {type: integer}
                            food_cost_pct: {type: number}
