      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {$ref: '#/components/responses/Success'}
        '404': {$ref: '#/components/responses/NotFound'}

  /api/inventory/movements/opening:
    post:
      tags: [Inventory]
      operationId: createOpeningBalance
      summary: Post opening stock balance
      description: Sets the initial quantity for a stock item at a location. Only one opening movement is allowed per item per location.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, location_id, items]
              properties:
                property_id: {type: string, format: uuid}
                location_id: {type: string, format: uuid}
                movement_date: {type: string, format: date}
                notes: {type: string}
                items:
                  type: array
                  items:
                    type: object
                    required: [stock_item_id, quantity]
                    properties:
                      stock_item_id: {type: string, format: uuid}
                      quantity: {type: number, format: float}
                      unit_cost: {type: integer, description: Cost per unit in kobo}
      responses:
        '201': {$ref: '#/components/responses/Created'}
        '422': {$ref: '#/components/responses/ValidationError'}

  /api/inventory/movements/grn:
    post:
      tags: [Inventory]
      operationId: createGrn
      summary: Receive goods (GRN)
      description: Records goods received from a supplier. Optionally links to an approved Purchase Order. Increases stock quantities immediately.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, location_id, items]
              properties:
                property_id: {type: string, format: uuid}
                location_id: {type: string, format: uuid}
                purchase_order_id: {type: string, format: uuid}
                vendor_id: {type: string, format: uuid}
                reference: {type: string, description: Supplier invoice or delivery note number}
                movement_date: {type: string, format: date}
                notes: {type: string}
                items:
                  type: array
                  items:
                    type: object
                    required: [stock_item_id, quantity]
                    properties:
                      stock_item_id: {type: string, format: uuid}
                      quantity: {type: number, format: float}
                      unit_cost: {type: integer}
                      batch_number: {type: string}
                      expiry_date: {type: string, format: date}
      responses:
        '201': {$ref: '#/components/responses/Created'}
        '422': {$ref: '#/components/responses/ValidationError'}

  /api/inventory/movements/issue:
    post:
      tags: [Inventory]
      operationId: createIssue
      summary: Issue stock to a department
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, location_id, department, items]
              properties:
                property_id: {type: string, format: uuid}
                location_id: {type: string, format: uuid}
                department: {type: string, example: Kitchen}
                movement_date: {type: string, format: date}
                notes: {type: string}
                items:
                  type: array
                  items:
                    type: object
                    required: [stock_item_id, quantity]
                    properties:
                      stock_item_id: {type: string, format: uuid}
                      quantity: {type: number, format: float}
      responses:
        '201': {$ref: '#/components/responses/Created'}

  /api/inventory/movements/transfer:
    post:
      tags: [Inventory]
      operationId: createTransfer
      summary: Transfer stock between locations
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, from_location_id, to_location_id, items]
              properties:
                property_id: {type: string, format: uuid}
                from_location_id: {type: string, format: uuid}
                to_location_id: {type: string, format: uuid}
                movement_date: {type: string, format: date}
                notes: {type: string}
                items:
                  type: array
                  items:
                    type: object
                    required: [stock_item_id, quantity]
                    properties:
                      stock_item_id: {type: string, format: uuid}
                      quantity: {type: number, format: float}
      responses:
        '201': {$ref: '#/components/responses/Created'}

  /api/inventory/movements/adjustment:
    post:
      tags: [Inventory]
      operationId: createAdjustment
      summary: Adjust stock count
      description: Corrects a discrepancy between system quantity and physical count. Use a positive quantity_change to increase stock, negative to decrease.
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [property_id, location_id, reason, items]
              properties:
                property_id: {type: string, format: uuid}
                location_id: {type: string, format: uuid}
                reason: {type: string, example: Cycle count — found shortage in Main Bar}
                movement_date: {type: string, format: date}
                items:
                  type: array
                  items:
                    type: object
                    required: [stock_item_id, quantity_change]
                    properties:
                      stock_item_id: {type: string, format: uuid}
                      quantity_change: {type: number, format: float, description: Positive to add, negative to reduce}
      responses:
        '201': {$ref: '#/components/responses/Created'}

