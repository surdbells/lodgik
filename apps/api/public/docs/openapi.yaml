        '200': {$ref: '#/components/responses/Success'}
    post:
      tags: [Inventory]
      operationId: createStockItem
      summary: Create a stock item
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, sku, property_id, uom_id]
              properties:
                name: {type: string, example: Heineken Beer 33cl}
                sku: {type: string, example: BEV-HEIN-33}
                property_id: {type: string, format: uuid}
                category_id: {type: string, format: uuid}
                uom_id: {type: string, format: uuid}
                location_id: {type: string, format: uuid}
                min_quantity: {type: number, format: float, example: 24}
                max_quantity: {type: number, format: float}
                reorder_point: {type: number, format: float}
                unit_cost: {type: integer, description: Cost in kobo}
      responses:
        '201': {$ref: '#/components/responses/Created'}
        '422': {$ref: '#/components/responses/ValidationError'}

