- name: AppDistribution
  description: Mobile app release management, downloads, version checks
- name: Asset
  description: Hotel asset registry, incidents, preventive maintenance, engineers
- name: Attendance
  description: Staff shifts, shift assignments, clock in/out, attendance reports
- name: Auth
  description: Authentication — register, login, refresh, forgot/reset password
- name: Booking
  description: Room reservations, check-in/out, cancellations, calendar
- name: Chat
  description: Multi-department guest-staff real-time messaging
- name: Dashboard
  description: Hotel operational dashboard, occupancy trends, revenue breakdown
- name: Employee
  description: Employee management, departments, positions, directory
- name: Feature
  description: Feature flag management — modules, dependencies, tenant toggles
- name: Finance
  description: Expenses, night audit, police reports, performance reviews, pricing rules, group bookings
- name: Folio
  description: Guest folios — charges, payments, adjustments, close/void
- name: Guest
  description: Guest profiles, search, documents, merge, nationalities
- name: GuestAuth
  description: Guest mobile/tablet authentication — OTP, access codes, sessions
- name: GuestServices
  description: Smart guest services — vouchers, waitlist, charge transfers, stay extensions
- name: Gym
  description: Gym facility — plans, members, memberships, classes, check-ins, payments
- name: Health
  description: System health check (no authentication required)
- name: Housekeeping
  description: Room cleaning tasks, assignments, inspections, lost and found
- name: Invoice
  description: Invoice generation, PDF export, email, void
- name: IoT
  description: IoT device management, controls, energy reports, automations
- name: Leave
  description: Leave types, requests, approvals, balances
- name: Loyalty
  description: Guest loyalty — tiers, points, promotions, preferences
- name: Merchant
  description: Merchant ecosystem — registration, KYC, commissions, payouts, leads, resources
- name: Notification
  description: Push and in-app notifications, device token management
- name: Onboarding
  description: Tenant onboarding wizard — registration, branding, plan selection, staff invites
- name: Ota
  description: OTA channel management — Booking.com, Expedia, reservations, sync
- name: Payroll
  description: Payroll periods, calculation, approval, payslips, tax brackets
- name: Pos
  description: Point of sale — tables, categories, products, orders, kitchen display
- name: Room
  description: Room types, rooms, amenities, availability, status management
- name: RoomControl
  description: In-room controls — DND, make-up requests, maintenance
- name: Security
  description: Visitor codes, gate passes, movement tracking, on-premise monitoring
- name: ServiceRequest
  description: Guest service requests — room service, maintenance, concierge
- name: Spa
  description: Spa services, bookings, pool access and occupancy
- name: Staff
  description: Staff user management — invite, update, deactivate
- name: Subscription
  description: SaaS subscription billing via Paystack — initialize, verify, upgrade, cancel
- name: Tenant
  description: Tenant settings, properties, bank accounts
- name: Usage
  description: Platform usage metrics, quotas, and history
- name: WhatsApp
  description: WhatsApp messaging via Termii — templates, OTP, message history
- name: Inventory
  description: Stock items, categories, UOMs, locations, movements (GRN/issue/transfer/adjustment/opening), stock balances, and 7-panel inventory reports with CSV export
- name: Procurement
  description: Vendor management, purchase requests with approval workflow, and purchase orders with receiving/GRN
- name: Recipe
  description: Recipe builder linking POS products to stock ingredients, food-cost calculation per product, and food-cost report across a date range
