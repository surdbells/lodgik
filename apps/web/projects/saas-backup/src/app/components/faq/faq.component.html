
<section id="faq" aria-labelledby="faq-heading">
  <div class="container">
    <header class="faq-intro reveal">
      <div class="label">FAQ</div>
      <h2 class="section-title" id="faq-heading">
        Questions we hear <em>all the time</em>
      </h2>
    </header>
    <div class="faq-list" role="list">
      <div class="faq-item reveal" *ngFor="let f of faqs; let i = index"
           role="listitem" [class.open]="isOpen(i)">
        <button class="faq-q" (click)="toggle(i)"
                [attr.aria-expanded]="isOpen(i)"
                [attr.aria-controls]="'faq-answer-' + i">
          <span>{{ f.q }}</span>
          <span class="faq-icon" aria-hidden="true">{{ isOpen(i) ? '−' : '+' }}</span>
        </button>
        <div class="faq-a" [id]="'faq-answer-' + i" role="region" [hidden]="!isOpen(i)">
          <p>{{ f.a }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
