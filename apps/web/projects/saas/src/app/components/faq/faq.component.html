
<section id="faq" class="faq-section">
  <div class="container">
    <header class="section-header reveal" style="text-align:center;margin-bottom:3rem;">
      <div class="badge-label primary section-eyebrow">FAQ</div>
      <h2 class="section-heading">Questions we hear <em>all the time</em></h2>
    </header>
    <div class="faq-list" role="list">
      <div class="faq-item reveal" *ngFor="let f of faqs; let i=index" [class.open]="isOpen(i)" role="listitem">
        <button class="faq-q" (click)="toggle(i)"
                [attr.aria-expanded]="isOpen(i)" [attr.aria-controls]="'faq-a-'+i">
          <span>{{ f.q }}</span>
          <span class="faq-chevron" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline [attr.points]="isOpen(i) ? '18 15 12 9 6 15' : '6 9 12 15 18 9'"/>
            </svg>
          </span>
        </button>
        <div class="faq-a" [id]="'faq-a-'+i" [hidden]="!isOpen(i)">
          <p>{{ f.a }}</p>
        </div>
      </div>
    </div>
  </div>
</section>
