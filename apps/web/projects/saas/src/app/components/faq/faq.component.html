<section id="faq" class="faq-section">
  <div class="container">
    <header class="reveal" style="text-align:center;margin-bottom:2.8rem;">
      <div class="eyebrow green" style="margin-bottom:.8rem">FAQ</div>
      <h2 class="section-heading">Questions we hear <em>all the time</em></h2>
    </header>
    <div class="faq-list" role="list">
      <div class="faq-item reveal" *ngFor="let f of faqs; let i=index" [class.open]="open()===i" role="listitem">
        <button class="faq-q" (click)="toggle(i)" [attr.aria-expanded]="open()===i">
          <span>{{ f.q }}</span>
          <svg class="chevron" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <polyline [attr.points]="open()===i ? '18 15 12 9 6 15' : '6 9 12 15 18 9'"/>
          </svg>
        </button>
        <div class="faq-a" [hidden]="open()!==i"><p>{{ f.a }}</p></div>
      </div>
    </div>
  </div>
</section>
