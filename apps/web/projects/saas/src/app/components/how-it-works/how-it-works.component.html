<section id="how" class="how-section">
  <div class="container">
    <header class="reveal" style="text-align:center;margin-bottom:3rem;">
      <div class="eyebrow green" style="margin-bottom:.8rem">How It Works</div>
      <h2 class="section-heading">Up and running <em>in hours</em></h2>
    </header>
    <div class="steps">
      <div class="step reveal" *ngFor="let s of steps; let i=index" [class]="'reveal d'+i">
        <div class="step-n">{{ s.n }}</div>
        <h3>{{ s.t }}</h3>
        <p>{{ s.d }}</p>
      </div>
    </div>
  </div>
</section>
