
<section id="integrations" aria-labelledby="integrations-heading">
  <div class="container">
    <div class="integrations-inner">
      <div class="integrations-copy reveal">
        <div class="label">Integrations</div>
        <h2 class="section-title" id="integrations-heading">
          Connected to the tools<br/><em>you already use</em>
        </h2>
        <p class="section-lead">Lodgik integrates with the payment processors, messaging platforms, and third-party services that African hotels rely on — out of the box, with no configuration required.</p>
        <a href="mailto:hello@lodgik.co" class="btn btn-outline" style="margin-top:2rem;display:inline-flex;">Request an Integration</a>
      </div>
      <div class="integrations-grid reveal d2">
        <div class="int-card" *ngFor="let i of integrations">
          <div class="int-icon" aria-hidden="true">{{ i.icon }}</div>
          <div class="int-name">{{ i.name }}</div>
          <div class="int-type">{{ i.type }}</div>
        </div>
      </div>
    </div>
  </div>
</section>
