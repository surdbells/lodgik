<section id="modules" class="modules-section">
  <div class="container">
    <div class="modules-top">
      <div class="reveal"><div class="eyebrow green" style="margin-bottom:.8rem">Feature Modules</div><h2 class="section-heading">Every part of your hotel, <em>covered</em></h2><p class="section-sub" style="max-width:420px;">Enable only the modules your property needs. Lodgik grows with you.</p></div>
      <div class="count-block reveal d2"><span class="cnt">43</span><span class="cnt-l">feature<br/>modules</span></div>
    </div>
    <div class="pills reveal">
      <span class="pill" *ngFor="let m of modules" [class]="'g-'+m.g"><span class="dot"></span>{{ m.name }}</span>
    </div>
  </div>
</section>
