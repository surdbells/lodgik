
<header class="nav-host" [class.scrolled]="scrolled()">
  <nav class="nav-pill" [class.scrolled]="scrolled()" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">

      <a class="nav-logo" href="/" aria-label="Lodgik Home">
        <div class="logo-mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <span>Lodgik</span>
      </a>

      <ul class="nav-links" role="list" [class.open]="menuOpen()">
        <li><button (click)="scrollTo('features')">Features</button></li>
        <li><button (click)="scrollTo('platform')">Platform</button></li>
        <li><button (click)="scrollTo('pricing')">Pricing</button></li>
        <li><button (click)="scrollTo('faq')">FAQ</button></li>
        <div class="nav-mobile-cta">
          <a href="https://hotel.lodgik.co/login" class="btn btn-outline" rel="noopener">Sign In</a>
          <a href="https://hotel.lodgik.co/register" class="btn btn-primary" rel="noopener">Start Free</a>
        </div>
      </ul>

      <div class="nav-right">
        <button class="theme-btn" (click)="toggleTheme()"
                [attr.aria-label]="isDark() ? 'Switch to light' : 'Switch to dark'">
          <ng-container *ngIf="!isDark()">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </ng-container>
          <ng-container *ngIf="isDark()">
            <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </ng-container>
        </button>
        <a href="https://hotel.lodgik.co/login" class="btn btn-ghost btn-sm d-desktop" rel="noopener">Sign In</a>
        <a href="https://hotel.lodgik.co/register" class="btn btn-primary btn-sm" rel="noopener">Get Started Free</a>
        <button class="hamburger" [class.open]="menuOpen()" (click)="toggleMenu()"
                [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </nav>
</header>
