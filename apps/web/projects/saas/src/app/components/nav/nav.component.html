
<nav [class.scrolled]="scrolled()">
  <div class="nav-inner container">
    <a class="nav-logo" href="/" aria-label="Lodgik Home">
      <div class="nav-logo-mark" aria-hidden="true">L</div>
      <span>Lodgik</span>
    </a>

    <ul class="nav-links" role="list" [class.open]="menuOpen()">
      <li><button (click)="scrollTo('features')">Features</button></li>
      <li><button (click)="scrollTo('platform')">Platform</button></li>
      <li><button (click)="scrollTo('guest-pwa')">Guest Portal</button></li>
      <li><button (click)="scrollTo('modules')">Modules</button></li>
      <li><button (click)="scrollTo('pricing')">Pricing</button></li>
      <li><button (click)="scrollTo('faq')">FAQ</button></li>
    </ul>

    <div class="nav-actions">
      <button class="theme-toggle" (click)="toggleTheme()"
              [attr.aria-label]="isDark() ? 'Switch to light theme' : 'Switch to dark theme'"
              [title]="isDark() ? 'Light mode' : 'Dark mode'">
        <svg *ngIf="!isDark()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg *ngIf="isDark()" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <a href="https://hotel.lodgik.co/login" class="btn btn-ghost btn-sm" rel="noopener">Sign In</a>
      <a href="https://hotel.lodgik.co/register" class="btn btn-primary btn-sm" rel="noopener">Free Trial</a>
      <button class="hamburger" [class.open]="menuOpen()" (click)="toggleMenu()"
              [attr.aria-expanded]="menuOpen()" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>
