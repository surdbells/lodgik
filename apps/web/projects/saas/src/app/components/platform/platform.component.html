<section id="platform" class="platform-section">
  <div class="container">
    <header class="platform-header reveal" style="text-align:center;margin-bottom:3rem;">
      <div class="eyebrow green" style="margin-bottom:.8rem">The Full Platform</div>
      <h2 class="section-heading">One codebase. <em>Every surface.</em></h2>
      <p class="section-sub" style="max-width:520px;margin:0 auto;">All 12 Lodgik apps share one database and one API. Staff apps go directly to hotel devices — no app store delays.</p>
    </header>
    <div class="apps-grid reveal">
      <div class="app-tile" *ngFor="let a of apps">
        <div class="at-icon">{{ a.icon }}</div>
        <div class="at-body"><h4>{{ a.title }}</h4><p>{{ a.desc }}</p></div>
        <span class="at-badge" [class]="a.cls">{{ a.badge }}</span>
      </div>
    </div>
  </div>
</section>
