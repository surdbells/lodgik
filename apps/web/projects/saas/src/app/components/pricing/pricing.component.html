
<section id="pricing" class="pricing-section">
  <div class="container">
    <header class="section-header reveal" style="text-align:center;margin-bottom:2.5rem;">
      <div class="badge-label primary section-eyebrow">Pricing</div>
      <h2 class="section-heading">Plans for every <em>size of hotel</em></h2>
      <p class="section-sub" style="max-width:440px;margin:0 auto;">Billed in Naira. No hidden fees. Cancel any time.</p>
    </header>

    <div class="billing-switch" role="group" aria-label="Billing period">
      <span [class.on]="!annual()">Monthly</span>
      <button class="toggle" [class.active]="annual()" role="switch" [attr.aria-checked]="annual()" (click)="toggle()">
        <span class="thumb"></span>
      </button>
      <span [class.on]="annual()">Annual</span>
      <span class="save-tag">Save 20%</span>
    </div>

    <div class="plans reveal">
      <div class="plan-card" *ngFor="let p of plans" [class.popular]="p.popular">
        <div class="popular-tag" *ngIf="p.popular">Most Popular</div>
        <div class="plan-tier">{{ p.tier }}</div>
        <div class="plan-price" *ngIf="p.monthly">
          <sup>₦</sup>{{ price(p) }}<sub>/mo</sub>
        </div>
        <div class="plan-price custom" *ngIf="!p.monthly">Custom</div>
        <p class="plan-desc">{{ p.desc }}</p>
        <ul class="plan-features">
          <li *ngFor="let f of p.features; let i=index" [class.dim]="isDim(p,i)">{{ f }}</li>
        </ul>
        <a [href]="p.href" class="btn" [ngClass]="'btn ' + p.ctaClass"
           [attr.rel]="p.href.startsWith('http') ? 'noopener' : null">{{ p.cta }}</a>
      </div>
    </div>
    <p class="pricing-note reveal">All plans include a 14-day free trial · No credit card required · <a href="mailto:hello@lodgik.co">Talk to us</a></p>
  </div>
</section>
