version: '3.8'

services:
  # ─── PHP API ──────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: lodgik-api
    ports:
      - "8080:8080"
    volumes:
      - ./apps/api:/app
      - api_vendor:/app/vendor
    environment:
      APP_NAME: Lodgik
      APP_ENV: development
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      APP_SECRET: dev-secret-change-in-production-64chars-minimum-needed-here!!
      DB_DRIVER: pdo_pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: lodgik
      DB_USER: lodgik
      DB_PASSWORD: lodgik_secret
      DB_CHARSET: utf8
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_PREFIX: "lodgik:"
      JWT_SECRET: dev-jwt-secret-change-in-production-64chars-minimum-needed-here!!
      JWT_ACCESS_TTL: "900"
      JWT_REFRESH_TTL: "604800"
      ZEPTOMAIL_API_KEY: ""
      ZEPTOMAIL_FROM_EMAIL: noreply@lodgik.com
      ZEPTOMAIL_FROM_NAME: Lodgik
      CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://localhost:8080"
      LOG_CHANNEL: stderr
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lodgik

  # ─── PostgreSQL 16 ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: lodgik-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lodgik
      POSTGRES_USER: lodgik
      POSTGRES_PASSWORD: lodgik_secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lodgik -d lodgik"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lodgik

  # ─── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lodgik-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - lodgik

volumes:
  pg_data:
  redis_data:
  api_vendor:

networks:
  lodgik:
    driver: bridge
