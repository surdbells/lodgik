# Lodgik Phase 1A — CORS Nginx fix
# Place the map block in /www/server/nginx/conf/nginx.conf http{} context,
# then update api.lodgik.co vhost as described.

map $http_origin $cors_origin {
    default                          "";
    "https://hotel.lodgik.co"        $http_origin;
    "https://admin.lodgik.co"        $http_origin;
    "https://merchant.lodgik.co"     $http_origin;
    "http://localhost:4200"          $http_origin;
    "http://localhost:4201"          $http_origin;
    "http://localhost:4202"          $http_origin;
}

# Inside server {} block replace:
#   add_header Access-Control-Allow-Origin "*" always;
# With these two lines:
#   add_header Access-Control-Allow-Origin  $cors_origin always;
#   add_header Vary                         Origin        always;
